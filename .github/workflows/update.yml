name: Förderprogramme aktualisieren

on:
  schedule:
    - cron: '0 5 * * *'   # täglich 05:00 UTC = 06:00/07:00 Uhr DE
  workflow_dispatch:        # auch manuell auslösbar per Knopfdruck

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install anthropic

      - name: Förderprogramme abrufen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_foerderung.py

      - name: JSON committen
        run: |
          git config user.name "foerdertracker-bot"
          git config user.email "bot@wassermann.de"
          git add foerderung.json
          git diff --staged --quiet || git commit -m "Förderprogramme aktualisiert $(date +'%d.%m.%Y')"
          git push
