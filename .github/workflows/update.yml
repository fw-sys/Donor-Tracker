#!/usr/bin/env python3
import os, json, sys, traceback, anthropic
from datetime import datetime

def main():
    log = []
    try:
        api_key = os.environ.get("ANTHROPIC_API_KEY", "")
        log.append(f"API-Key vorhanden: {'ja' if api_key else 'NEIN'}")
        if api_key:
            log.append(f"API-Key Anfang: {api_key[:8]}...")

        client = anthropic.Anthropic(api_key=api_key)
        log.append("Client erstellt")

        response = client.messages.create(
            model="claude-sonnet-4-6",
            max_tokens=100,
            messages=[{"role": "user", "content": "Sag nur: OK"}],
        )
        log.append(f"Antwort: {response.content[0].text}")
        log.append("ERFOLG")

    except Exception as e:
        log.append(f"FEHLER: {type(e).__name__}: {e}")
        log.append(traceback.format_exc())

    # Log in Datei schreiben damit wir es im Repo sehen
    with open("debug.log", "w") as f:
        f.write("\n".join(log))
    print("\n".join(log))

if __name__ == "__main__":
    main()
